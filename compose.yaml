services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: asterism
      POSTGRES_USER: asterism
      POSTGRES_PASSWORD: asterism
    ports:
      - "5433:5432"
    volumes:
      - asterism-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U asterism -d asterism"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  asterism-postgres:
