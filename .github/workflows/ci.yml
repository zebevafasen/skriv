name: Unified CI

on:
  pull_request:
  push:
    branches: [main, codex/unified-web-desktop]

concurrency:
  group: unified-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.11.0
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm desktop:release-check
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm test
      - run: pnpm build
      - run: pnpm build:vercel

  web-e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: skriv
          POSTGRES_USER: skriv
          POSTGRES_PASSWORD: skriv
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U skriv"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://skriv:skriv@localhost:5432/skriv
      DEV_AUTH_BYPASS: "true"
      AI_PROVIDER: fake
      FAKE_AI_DELAY_MS: "1"
      BETTER_AUTH_SECRET: ci-only-secret-at-least-32-characters
      CREDENTIAL_ENCRYPTION_KEY: ci-only-credential-key-at-least-32-chars
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.11.0
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm db:migrate
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm web:e2e
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  windows:
    needs: quality
    runs-on: windows-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.11.0
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm test
      - run: cargo fmt --manifest-path apps/desktop/src-tauri/Cargo.toml -- --check
      - run: cargo clippy --manifest-path apps/desktop/src-tauri/Cargo.toml --all-targets -- -D warnings
      - run: cargo test --manifest-path apps/desktop/src-tauri/Cargo.toml
      - run: pnpm desktop:build
      - run: cargo install tauri-driver --locked
      - run: pnpm desktop:e2e
      - uses: actions/upload-artifact@v4
        with:
          name: skriv-windows-x64-beta
          path: apps/desktop/src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error
          retention-days: 14
