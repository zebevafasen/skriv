name: Desktop CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: desktop-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  windows:
    runs-on: windows-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.11.0
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm test
      - run: cargo fmt --manifest-path apps/desktop/src-tauri/Cargo.toml -- --check
      - run: cargo clippy --manifest-path apps/desktop/src-tauri/Cargo.toml --all-targets -- -D warnings
      - run: cargo test --manifest-path apps/desktop/src-tauri/Cargo.toml
      - run: pnpm desktop:build
      - run: cargo install tauri-driver --locked
      - run: pnpm desktop:e2e
      - uses: actions/upload-artifact@v4
        with:
          name: asterism-windows-x64-beta
          path: apps/desktop/src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error
          retention-days: 14
