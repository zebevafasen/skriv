name: Desktop Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  windows-installer:
    runs-on: windows-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.11.0
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - run: pnpm install --frozen-lockfile
      - run: pnpm desktop:release-check
      - run: pnpm typecheck
      - run: pnpm lint
      - run: pnpm test
      - run: cargo fmt --manifest-path apps/desktop/src-tauri/Cargo.toml -- --check
      - run: cargo clippy --manifest-path apps/desktop/src-tauri/Cargo.toml --all-targets -- -D warnings
      - run: cargo test --manifest-path apps/desktop/src-tauri/Cargo.toml
      - run: pnpm desktop:build
      - name: Prepare release assets
        id: assets
        shell: pwsh
        run: |
          $installer = Get-ChildItem apps/desktop/src-tauri/target/release/bundle/nsis/*.exe | Select-Object -First 1
          if (-not $installer) { throw "The NSIS installer was not produced." }
          $checksum = "$($installer.FullName).sha256"
          $hash = (Get-FileHash -LiteralPath $installer.FullName -Algorithm SHA256).Hash.ToLowerInvariant()
          "$hash  $($installer.Name)" | Set-Content -LiteralPath $checksum -Encoding ascii
          "installer=$($installer.FullName)" >> $env:GITHUB_OUTPUT
          "checksum=$checksum" >> $env:GITHUB_OUTPUT
      - name: Create draft GitHub release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          INSTALLER: ${{ steps.assets.outputs.installer }}
          CHECKSUM: ${{ steps.assets.outputs.checksum }}
        run: gh release create $env:GITHUB_REF_NAME $env:INSTALLER $env:CHECKSUM --draft --verify-tag --title "Skriv $env:GITHUB_REF_NAME" --generate-notes
